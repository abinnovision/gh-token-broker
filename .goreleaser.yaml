version: 2

project_name: gh-token-broker

builds:
  - id: gh-token-broker
    main: ./cmd/gh-token-broker
    binary: gh-token-broker
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64

dockers_v2:
  - id: gh-token-broker
    dockerfile: Dockerfile
    ids:
      - gh-token-broker
    images:
      - ghcr.io/abinnovision/gh-token-broker
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.source: https://github.com/abinnovision/gh-token-broker
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

archives:
  - formats: [tar.gz]

checksum:
  name_template: checksums.txt

changelog:
  # release-please owns the changelog (CHANGELOG.md + GitHub Release notes).
  disable: true

release:
  github:
    owner: abinnovision
    name: gh-token-broker
  # Attach archives + checksums to the Release that release-please already
  # created for this tag, instead of trying to recreate it.
  mode: append
  # release-please cuts the release as a draft (draft + force-tag-creation in
  # release-please-config.json). use_existing_draft lets GoReleaser adopt that
  # draft by name, append the archives, and publish it.
  use_existing_draft: true
