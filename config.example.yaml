# gh-token-broker example configuration.
#
# Policy is CEL-only: every policy has a CEL `condition` plus a static,
# operator-authored permission grant. Every matching policy contributes to one
# combined permission grant; policy conditions authorize repositories.

server:
  bind: ":8080"

oidc:
  # GitHub Actions OIDC issuer (pinned). Override only for GHES.
  issuer: "https://token.actions.githubusercontent.com"
  # REQUIRED: a proxy-specific audience. GitHub's default audience is claimable
  # by any workflow in the org, so this MUST be a value you set explicitly on
  # the caller side (id-token: request with `aud: <this value>`).
  audience: "gh-token-broker"
  clockSkewSeconds: 60

githubApp:
  appId: 123456
  # Reference the private key by file path OR by env var name — never paste raw
  # PEM into this file. Set exactly one of the two.
  privateKeyPath: "/etc/gh-token-broker/app.pem"
  # privateKeyEnv: "GITHUB_APP_PRIVATE_KEY"

# RFC 8693 OAuth 2.0 Token Exchange. When false, /token and
# /.well-known/oauth-authorization-server are not registered at all (see README).
tokenIssuance:
  enabled: false
  # Stable, publicly resolvable HTTPS URL matching how this service is
  # externally reachable. Used verbatim as the OAuth "issuer" value and in
  # RFC 8414 metadata. Required when enabled is true.
  issuer: "https://gh-token-broker.example.com"

policy:
  # CEL runtime cost limit per evaluation (defense against pathological policies).
  costLimit: 10000
  # Cap on a caller-supplied request.repositories list before it is bound as a
  # CEL variable. Oversized requests are rejected, never truncated.
  maxRepositories: 256
  policies:
    # ANCHORED matching only: use == or `in [...]` against id-anchored caller
    # claims. Never use substring/prefix matching (no such helpers are exposed).
    - name: acme-ci-can-dispatch
      condition: 'request.?workflow_dispatch.hasValue() && caller.repository_owner == "acme" && caller.repository == "acme/app" && request.workflow_dispatch.owner == "acme" && request.workflow_dispatch.repo == "app"'
      grant:
        permissions:
          actions: write
          contents: read
    # Conditions authorize requested repositories directly, which supports
    # dynamic targets without enumerating them in configuration:
    - name: gitops-sibling
      condition: 'request.repositories.all(r, r == caller.repository + "-gitops")'
      grant:
        permissions:
          contents: read
